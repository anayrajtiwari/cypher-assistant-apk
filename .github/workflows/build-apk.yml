name: Build Cypher Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Standalone APK with Gradle
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cypher-v2.0-standalone.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release & Release Asset
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v2.0
          name: "Cypher OS AI Assistant v2.0 Standalone APK"
          body: "Official standalone APK for Cypher OS Agent. Includes 3D Blue Hologram HUD, Android 16 Auto-Start, Call Interceptor, Recorder, and 'zed_one_eight' Wake Word Listener."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
