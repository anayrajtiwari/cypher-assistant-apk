name: Build Cypher APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cypher_app/android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 34 + NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-34" "build-tools;34.0.0" \
            "ndk;26.1.10909125" "cmake;3.22.1" 2>&1 | tail -5
          echo "NDK installed"

      - name: Reassemble & publish full GGUF model
        run: |
          mkdir -p /tmp/gguf_chunks
          gh release download v1.0 \
            --repo anayrajtiwari/cypher-assistant-apk \
            --pattern "gguf_chunk_*" \
            --dir /tmp/gguf_chunks/
          cat /tmp/gguf_chunks/gguf_chunk_* > /tmp/cypher-1.5b-q4_0.gguf
          ls -lh /tmp/cypher-1.5b-q4_0.gguf
          gh release upload v1.0 \
            --repo anayrajtiwari/cypher-assistant-apk \
            --clobber \
            /tmp/cypher-1.5b-q4_0.gguf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cypher-debug
          path: cypher_app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Release
        run: |
          gh release upload v1.0 \
            --repo anayrajtiwari/cypher-assistant-apk \
            --clobber \
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
